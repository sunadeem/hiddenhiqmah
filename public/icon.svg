<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#000000"/>

  <!-- Subtle Islamic arch frame -->
  <path d="M256 52 C340 52 408 120 408 204 L408 420 C408 434 397 445 383 445 L129 445 C115 445 104 434 104 420 L104 204 C104 120 172 52 256 52Z"
        fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.25"/>

  <!-- Inner arch glow -->
  <path d="M256 72 C330 72 388 130 388 204 L388 410 C388 420 380 428 370 428 L142 428 C132 428 124 420 124 410 L124 204 C124 130 182 72 256 72Z"
        fill="#c9a84c" opacity="0.04"/>

  <!-- HH Monogram - two H's sharing the middle stroke -->
  <!-- Left H: left vertical -->
  <rect x="148" y="160" width="28" height="192" rx="6" fill="#c9a84c"/>
  <!-- Left H: right vertical / shared center -->
  <rect x="242" y="160" width="28" height="192" rx="6" fill="#c9a84c"/>
  <!-- Left H: crossbar -->
  <rect x="148" y="238" width="122" height="24" rx="6" fill="#c9a84c"/>

  <!-- Right H: left vertical is the shared center (242) -->
  <!-- Right H: right vertical -->
  <rect x="336" y="160" width="28" height="192" rx="6" fill="#c9a84c"/>
  <!-- Right H: crossbar -->
  <rect x="242" y="238" width="122" height="24" rx="6" fill="#c9a84c"/>

  <!-- Small diamond ornament at top of arch -->
  <rect x="248" y="82" width="16" height="16" rx="2" fill="#c9a84c" opacity="0.5" transform="rotate(45 256 90)"/>
</svg>
